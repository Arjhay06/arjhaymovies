<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arjhay TV</title>

  <link rel="stylesheet" href="home.css" />
  <script defer src="home.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <header class="top-nav">
    <a href="index.html" class="brand">Arjhay<span>TV</span></a>

    <nav class="tabs">
      <button class="tab active" type="button" data-tab="home">Home</button>
      <button class="tab" type="button" data-tab="movies">Movies</button>
      <button class="tab" type="button" data-tab="tvshows">TV Shows</button>
    </nav>

    <div class="nav-icons">
      <button type="button" class="icon-btn" onclick="openSearchModal()" aria-label="Search">
        <i class="fa-solid fa-magnifying-glass"></i>
      </button>
      <button type="button" class="icon-btn" aria-label="Notifications">
        <i class="fa-solid fa-bell"></i>
      </button>
      <button type="button" class="icon-btn" aria-label="Menu">
        <i class="fa-solid fa-table-cells"></i>
      </button>
    </div>
  </header>

  <main class="page-shell">
    <!-- HERO -->
    <section class="hero-banner" id="hero-banner">
      <div class="hero-backdrop" id="hero-backdrop"></div>

      <div class="hero-content">
        <div class="hero-meta">
          <span class="imdb-badge">IMDb</span>
          <span id="hero-rating">7.8 Rating</span>
          <span id="hero-translation" class="hero-translation">Sub/Dub Available</span>
        </div>

        <h1 id="hero-title">Loading...</h1>
        <p id="hero-overview">Please wait...</p>

        <div class="hero-actions">
          <button id="hero-watch-btn" class="watch-now-btn" type="button">Watch now</button>
        </div>
      </div>

      <button class="hero-arrow hero-prev" type="button" onclick="prevHero()">❮</button>
      <button class="hero-arrow hero-next" type="button" onclick="nextHero()">❯</button>
    </section>


    <!-- CONTINUE -->
    <section class="section-block always-visible">
      <div class="section-head">
        <h2>Continue watching</h2>
        <a href="#" class="see-all" data-target="history-list">See all</a>
      </div>
      <div class="poster-row" id="history-list"></div>
    </section>

    <!-- MAIN MOVIES / MOVIES TAB / TV SHOWS TAB CONTENT -->
    <section class="section-block" data-main-section="movies">
      <div class="section-head">
        <h2 data-main-title>Trending movies</h2>
        <a href="#" class="see-all" data-target="movies-list">See all</a>
      </div>
      <div class="poster-row" id="movies-list"></div>
    </section>

    <!-- TOP RATED -->
    <section class="section-block" data-main-section="toprated">
      <div class="section-head">
        <h2>Top rated <span class="star">★</span></h2>
        <a href="#" class="see-all" data-target="tvshows-list">See all</a>
      </div>
      <div class="poster-row" id="tvshows-list"></div>
    </section>

    <!-- TRENDING ANIME -->
    <section class="section-block" data-main-section="anime">
      <div class="section-head">
        <h2>Trending anime</h2>
        <a href="#" class="see-all" data-target="anime-list">See all</a>
      </div>
      <div class="poster-row" id="anime-list"></div>
    </section>
  </main>

  <div class="search-modal" id="search-modal">
    <div class="search-panel">
      <div class="search-input-wrap">
        <input
          type="text"
          id="search-input"
          placeholder="Search for a movie or show..."
          oninput="searchTMDB()"
        />
        <button class="search-close" type="button" onclick="closeSearchModal()">×</button>
      </div>
      <div class="search-results-grid" id="search-results"></div>
    </div>
  </div>
</body>
</html>

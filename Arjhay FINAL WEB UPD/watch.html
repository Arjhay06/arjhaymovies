<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arjhay TV - Watch</title>

  <link rel="stylesheet" href="home.css" />
  <script defer src="home.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div class="main">
    <header class="top-nav">
      <a href="index.html" class="brand">Arjhay<span>TV</span></a>

      <div class="nav-icons">
        <button type="button" class="icon-btn" onclick="openSearchModal()">
          <i class="fa-solid fa-magnifying-glass"></i>
        </button>
      </div>
    </header>

    <section class="watch-layout">

      <!-- LEFT -->
      <div>
        <div class="player-container">
          <iframe id="modal-video" allowfullscreen></iframe>
        </div>

        <!-- INFO -->
        <div class="watch-info">
          <h1 id="watch-title">Loading...</h1>
          <p id="watch-description">Loading...</p>

          <!-- SERVER -->
          <div class="server-box">
            <label>Server</label>
            <select id="server"></select>
          </div>
        </div>

        <!-- SEASONS -->
        <div id="season-container"></div>
      </div>

      <!-- RIGHT EPISODES -->
      <aside id="episode-sidebar">
        <select id="season-select"></select>
        <div id="episode-list"></div>
      </aside>

    </section>
  </div>
</body>
</html>
